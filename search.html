<body>
  <script>window.SS_ROOT = "";</script>

  <div id="site-header"></div>

      <a href="index.html">Home</a><span class="sep">/</span><span class="current" data-i18n="search_title">Search Services</span>

    <div class="tricolor-rule" aria-hidden="true"></div>

        placeholder="Search a service, e.g. Aadhaar, PAN, PM Kisan..."

    <p class="search-page-status" id="search-page-status"></p>
