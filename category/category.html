<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png">
  <link rel="icon" href="../favicon.ico">
  <link rel="manifest" href="../manifest.json">
  <meta property="og:image" content="https://akhairkar.github.io/sarkarisewa-portal/assets/img/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <title>Category — SarkariSewa Portal</title>
  <meta name="description" content="Browse government services by category on SarkariSewa Portal." />

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/module2.css" />
</head>
<body>
  <script>window.SS_ROOT = "../";</script>

  <div id="site-header"></div>

  <main class="container">
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

    <div class="tricolor-rule" aria-hidden="true"></div>

    <section class="category-hero" id="category-hero">
      <!-- Filled by category.js: icon, title, description, service count -->
    </section>

    <section aria-labelledby="services-heading">
      <h2 class="sr-only" id="services-heading">Services in this category</h2>
      <div class="service-grid" id="service-grid">
        <!-- Service cards rendered here -->
      </div>
    </section>

    <div class="ad-slot" aria-hidden="true"><span data-i18n="ad_slot_label">Advertisement</span></div>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/consent.js"></script>
  <script src="../assets/js/i18n-helper.js"></script>
  <script src="../assets/js/category.js"></script>
</body>
</html>
